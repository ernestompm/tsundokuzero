<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="apple-touch-icon" href="/icon-192.png" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, viewport-fit=cover"
    />
    <meta name="theme-color" content="#F6F3EC" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="apple-mobile-web-app-title" content="Tsundoku" />
    <meta
      name="description"
      content="Tsundoku Zero — leer acompañado, sin spoilers."
    />
    <title>Tsundoku Zero</title>
    <!-- Material Symbols: subconjunto SELF-HOSTED en /fonts (RGPD: sin
         peticiones a Google). Lista de iconos: scripts/icons.txt;
         @font-face en src/index.css; regenerar: npm run fetch:icons -->
    <!-- Preload del subconjunto de iconos (auditoría M-13): con
         font-display: block, sin preload los iconos tardan en aparecer -->
    <link
      rel="preload"
      href="/fonts/material-symbols-rounded.woff2"
      as="font"
      type="font/woff2"
      crossorigin
    />
    <!-- Tema antes del primer paint (auditoría B-07); externo por CSP -->
    <script src="/theme-init.js"></script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
